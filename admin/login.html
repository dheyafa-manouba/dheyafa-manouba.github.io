<!DOCTYPE html>
<!-- Admin Login Page: Firebase Authentication email/password login form -->
<!-- NOTE: auth-guard.js is NOT included on this page (Requirement 5.1) -->
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول – لوحة الإدارة</title>
  <link rel="icon" type="image/png" href="../img/logo.png" />
  <!-- Tailwind CSS v4 Play CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-primary: #1aace2;
      --color-primary-dark: #0f86b2;
      --color-primary-light: #ebf6f5;
      --color-primary-mid: #5bbee1;
      --color-accent: #fb9610;
      --color-accent-dark: #c8740a;
      --color-accent-light: #ebf6f5;
      --color-success: #1f7a53;
      --color-danger: #a53d38;
      --color-warning: #8a6a1f;
      --color-text: #163042;
      --color-text-muted: #4d6776;
      --color-border: #bfe3ef;
      --color-bg-alt: #ebf6f5;
      --color-bg-warm: #f5eec4;
      --font-size-base: 1.125rem;
      --font-size-sm: 1rem;
      --font-size-lg: 1.25rem;
      --border-radius: 0.5rem;
      --border-radius-lg: 0.875rem;
      --touch-target-min: 44px;
    }
  </style>
  <!-- Custom styles -->
  <link rel="stylesheet" href="../css/custom.css" />
</head>

<body>
  <div class="min-h-screen flex items-center justify-center py-10 px-4">
    <div class="w-full max-w-sm">

      <div class="admin-panel p-6 sm:p-7">
        <!-- Agency branding -->
        <div class="text-center mb-6">
          <img src="../img/logo.png" alt="Dheyafa Tourism Logo"
            style="height:72px;width:auto;object-fit:contain;border-radius:10px;margin-bottom:0.75rem;">
          <h1 class="text-2xl font-bold mt-2" data-i18n="login_title">تسجيل دخول المشرف</h1>
          <p class="text-text-muted" data-i18n="agency_name">ضيافة للسياحة</p>
        </div>

        <!-- Error message area -->
        <div id="login-error" class="p-3 rounded bg-red-50 border border-red-200 text-danger text-sm hidden"
          role="alert">
        </div>

        <!-- Login form -->
        <form id="login-form" novalidate>
          <div class="mb-4">
            <label for="login-email" class="block text-sm font-medium text-text mb-1"
              data-i18n="form_email_label">البريد
              الإلكتروني</label>
            <input type="email"
              class="w-full border border-border rounded px-3 py-2 text-base focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 min-h-[44px]"
              id="login-email" name="email" data-i18n-placeholder="ph_email" required dir="ltr" autocomplete="email">
          </div>
          <div class="mb-4">
            <label for="login-password" class="block text-sm font-medium text-text mb-1" data-i18n="form_password">كلمة
              المرور</label>
            <input type="password"
              class="w-full border border-border rounded px-3 py-2 text-base focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 min-h-[44px]"
              id="login-password" name="password" data-i18n-placeholder="ph_password" required
              autocomplete="current-password">
          </div>
          <button type="submit"
            class="inline-flex items-center justify-center w-full min-h-[44px] px-4 py-2 bg-primary text-white font-semibold rounded hover:bg-primary-dark transition-colors"
            id="login-btn" data-i18n="btn_sign_in">
            تسجيل الدخول
          </button>
        </form>

        <!-- Language toggle -->
        <div class="admin-lang-switch text-center mt-4 flex justify-center gap-2">
          <button
            class="lang-btn admin-lang-btn min-h-[44px] min-w-[44px] bg-primary-light border border-primary text-primary-dark font-bold text-sm rounded px-3 hover:bg-primary hover:text-white transition-colors"
            onclick="setLanguage('ar')" aria-label="Switch to Arabic">AR</button>
          <button
            class="lang-btn admin-lang-btn min-h-[44px] min-w-[44px] bg-primary-light border border-primary text-primary-dark font-bold text-sm rounded px-3 hover:bg-primary hover:text-white transition-colors"
            onclick="setLanguage('fr')" aria-label="Switch to French">FR</button>
        </div>
      </div>

    </div>
  </div>

  <!-- Firebase JS SDK v9 compat -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <!-- Shared JS modules (no auth-guard on login page) -->
  <script src="../js/firebase-init.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/toast.js"></script>

  <!-- Login script -->
  <script>
    // If user is already authenticated, redirect to dashboard immediately (Requirement 5.3)
    firebase.auth().onAuthStateChanged(function (user) {
      if (user) {
        window.location.href = "index.html";
      }
    });

    // Handle login form submission
    document.getElementById("login-form").addEventListener("submit", function (e) {
      e.preventDefault();

      var email = document.getElementById("login-email").value.trim();
      var password = document.getElementById("login-password").value;
      var loginBtn = document.getElementById("login-btn");
      var errorDiv = document.getElementById("login-error");

      // Hide any previous error and disable the button while the request is in flight
      errorDiv.classList.add("hidden");
      errorDiv.textContent = "";
      loginBtn.disabled = true;

      // Set session persistence so the session is cleared when the browser tab closes
      // (supports Requirement 5.4 — session invalidation on inactivity)
      firebase.auth()
        .setPersistence(firebase.auth.Auth.Persistence.SESSION)
        .then(function () {
          // Attempt sign-in with the provided credentials (Requirement 5.1)
          return firebase.auth().signInWithEmailAndPassword(email, password);
        })
        .then(function () {
          // On success: redirect to the admin dashboard (Requirement 5.3)
          window.location.href = "index.html";
        })
        .catch(function (error) {
          // Map Firebase error codes to bilingual messages (Requirement 5.2)
          var msgKey;
          switch (error.code) {
            case "auth/wrong-password":
            case "auth/invalid-credential":
              msgKey = "err_login_wrong_password";
              break;
            case "auth/user-not-found":
              msgKey = "err_login_user_not_found";
              break;
            case "auth/too-many-requests":
              msgKey = "err_login_too_many_requests";
              break;
            default:
              msgKey = "err_login_generic";
          }

          // Display the error message and re-enable the button
          errorDiv.textContent = t(msgKey);
          errorDiv.classList.remove("hidden");
          loginBtn.disabled = false;
        });
    });
  </script>
</body>

</html>
