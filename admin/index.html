      --color-bg-alt: #ebf6f5;
      --color-bg-warm: #f5eec4;

      --border-radius: 0.5rem;

  </style>
  <!-- Custom styles -->
  <link rel="stylesheet" href="../css/custom.css" />
</head>
<!-- Body hidden by default; revealed after auth check passes (Requirement 5.6) -->

<body style="display:none" class="admin-shell">

  <!-- Admin navbar -->

    <nav class="site-navbar admin-site-navbar" role="navigation" aria-label="Admin navigation">
      <div class="mx-auto max-w-7xl px-3 sm:px-4">
        <div class="nav-shell flex items-center justify-between gap-3 sm:gap-4">

            <img src="../img/logo.png" alt="Dheyafa Tourism Logo" class="navbar-logo">
            <span class="nav-brand-text" data-i18n="admin_dashboard">لوحة التحكم</span>
          </a>

          <button
            class="navbar-toggler sm:hidden min-h-[44px] min-w-[44px] flex items-center justify-center rounded-xl bg-transparent cursor-pointer"
            type="button" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="hamburger" aria-hidden="true">
              <span class="hamburger-line"></span>
              <span class="hamburger-line"></span>
              <span class="hamburger-line"></span>
            </span>
          </button>

          <div
            class="nav-menu hidden sm:flex flex-col sm:flex-row items-stretch sm:items-center gap-3 sm:gap-4 absolute sm:static top-full left-0 right-0 z-50"
            id="mainNav">
            <ul class="navbar-nav flex flex-col sm:flex-row list-none m-0 p-0 gap-1 sm:gap-1.5">
              <li><a class="nav-link block px-4 py-2 text-primary-dark font-medium rounded-full min-h-[44px] flex items-center active" aria-current="page" href="index.html" aria-label="لوحة التحكم"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5V21a1 1 0 0 1-1 1h-5.5v-6h-5v6H4a1 1 0 0 1-1-1z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="nav-text" data-i18n="admin_dashboard">لوحة التحكم</span></a></li>
              <li><a class="nav-link block px-4 py-2 text-primary-dark font-medium rounded-full min-h-[44px] flex items-center" href="voyages.html" aria-label="الرحلات"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 13h7l4 7h2l-2-7h7v-2h-7l2-7h-2l-4 7H3z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="nav-text" data-i18n="admin_voyages">الرحلات</span></a></li>
              <li><a class="nav-link block px-4 py-2 text-primary-dark font-medium rounded-full min-h-[44px] flex items-center" href="registrations.html" aria-label="التسجيلات"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 4h8m-8 4h8M7 3h10a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="nav-text" data-i18n="admin_registrations">التسجيلات</span></a></li>
              <li>
                <a class="nav-link block px-4 py-2 text-primary-dark font-medium rounded-full min-h-[44px] flex items-center gap-1" href="questions.html">
                  <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 11.5a8.5 8.5 0 0 1-8.5 8.5H7l-4 2 1.3-3.9A8.5 8.5 0 1 1 21 11.5z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="nav-text" data-i18n="admin_questions">الأسئلة</span>
                  <span class="inline-block px-2 py-0.5 text-xs font-semibold rounded bg-danger text-white ms-1" id="unread-badge" style="display:none"></span>
                </a>
              </li>
              <li><a class="nav-link block px-4 py-2 text-primary-dark font-medium rounded-full min-h-[44px] flex items-center" href="achievements.html" aria-label="الإنجازات"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m12 3 2.8 5.7 6.2.9-4.5 4.4 1.1 6.2L12 17.2 6.4 20.2l1.1-6.2L3 9.6l6.2-.9z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="nav-text" data-i18n="admin_achievements">الإنجازات</span></a></li>
            </ul>

            <div class="admin-nav-actions">
              <div class="nav-lang-switch admin-lang-switch flex gap-2 items-center mt-1 sm:mt-0">
                <button class="lang-btn admin-lang-btn min-h-[44px] min-w-[44px] px-3 text-sm font-bold" onclick="setLanguage('ar')" aria-label="Switch to Arabic">AR</button>
                <button class="lang-btn admin-lang-btn min-h-[44px] min-w-[44px] px-3 text-sm font-bold" onclick="setLanguage('fr')" aria-label="Switch to French">FR</button>
              </div>
              <button class="admin-logout-btn min-h-[44px] px-4 text-sm font-semibold inline-flex items-center justify-center" id="logout-btn" data-i18n="admin_logout">تسجيل الخروج</button>
            </div>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <main class="mx-auto px-4 max-w-7xl py-8">
    <h1 class="mb-5 admin-page-title" data-i18n="admin_dashboard">لوحة التحكم</h1>

    <!-- Stats row -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="admin-stat text-center">
        <h2 class="text-5xl font-bold text-primary" id="stat-unread-questions">–</h2>
        <p class="text-text-muted mt-1" data-i18n="admin_unread_questions">أسئلة غير مقروءة</p>
      </div>
      <div class="admin-stat text-center">
        <h2 class="text-5xl font-bold text-primary" id="stat-total-voyages">–</h2>
        <p class="text-text-muted mt-1" data-i18n="admin_total_voyages">إجمالي الرحلات</p>
      </div>
      <div class="admin-stat text-center">
        <h2 class="text-5xl font-bold text-primary" id="stat-pending-registrations">–</h2>
        <p class="text-text-muted mt-1" data-i18n="admin_pending_registrations">تسجيلات قيد الانتظار</p>
      </div>
    </div>

    <!-- Navigation links to sub-pages -->
    <div class="admin-toolbar grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
      <a href="voyages.html"
        class="inline-flex items-center justify-center w-full min-h-[44px] py-3 px-4 border-2 border-primary text-primary font-semibold rounded hover:bg-primary hover:text-white transition-colors"
        data-i18n="admin_voyages">الرحلات</a>
      <a href="registrations.html"
        class="inline-flex items-center justify-center w-full min-h-[44px] py-3 px-4 border-2 border-primary text-primary font-semibold rounded hover:bg-primary hover:text-white transition-colors"
        data-i18n="admin_registrations">التسجيلات</a>
      <a href="questions.html"
        class="inline-flex items-center justify-center w-full min-h-[44px] py-3 px-4 border-2 border-primary text-primary font-semibold rounded hover:bg-primary hover:text-white transition-colors">
        <span data-i18n="admin_questions">الأسئلة</span>
        <span class="inline-block px-2 py-0.5 text-xs font-semibold rounded bg-danger text-white ms-1"
          style="display:none"></span>
      </a>
      <a href="achievements.html"
        class="inline-flex items-center justify-center w-full min-h-[44px] py-3 px-4 border-2 border-primary text-primary font-semibold rounded hover:bg-primary hover:text-white transition-colors"
        data-i18n="admin_achievements">الإنجازات</a>
    </div>
  </main>

  <!-- Firebase JS SDK v9 compat -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <!-- Shared JS modules — firebase-init and auth-guard MUST be first -->
  <script src="../js/firebase-init.js"></script>
  <script src="../js/auth-guard.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/navbar.js"></script>

  <script>
    // ── Logout ───────────────────────────────────────────────────────────────
    document.getElementById("logout-btn").addEventListener("click", function () {
      firebase.auth().signOut().then(function () {
        window.location.href = "login.html";
      });
    });

    // ── Dashboard stats ──────────────────────────────────────────────────────
    /**
     * Loads summary statistics from Firebase RTDB and updates the dashboard:
     *   - Unread questions count  (/questions where isRead === false)
     *   - Total active voyages    (/voyages  where status  === "active")
     *   - Pending registrations   (/registrations where status === "pending")
     *
     * Requirements: 5.1, 5.6, 8.3
     */
    function loadDashboardStats() {
      var db = firebase.database();

      // ── Unread questions ─────────────────────────────────────────────────
      db.ref("questions").once("value", function (snapshot) {
        var unreadCount = 0;
        snapshot.forEach(function (child) {
          var q = child.val();
          if (q && q.isRead === false) {
            unreadCount++;
          }
        });

        document.getElementById("stat-unread-questions").textContent = unreadCount;

        // Update the nav badge
        var badge = document.getElementById("unread-badge");
        if (unreadCount > 0) {
          badge.textContent = unreadCount;
          badge.style.display = "";
        } else {
          badge.style.display = "none";
        }
      });

      // ── Total active voyages ─────────────────────────────────────────────
      db.ref("voyages").once("value", function (snapshot) {
        var activeCount = 0;
        snapshot.forEach(function (child) {
          var v = child.val();
          if (v && v.status === "active") {
            activeCount++;
          }
        });
        document.getElementById("stat-total-voyages").textContent = activeCount;
      });

      // ── Pending registrations ────────────────────────────────────────────
      db.ref("registrations").once("value", function (snapshot) {
        var pendingCount = 0;
        snapshot.forEach(function (child) {
          var r = child.val();
          if (r && r.status === "pending") {
            pendingCount++;
          }
        });
        document.getElementById("stat-pending-registrations").textContent = pendingCount;
      });
    }

    // Load stats once the DOM is ready (auth-guard will have revealed the body)
    document.addEventListener("DOMContentLoaded", function () {
      initNavbar();
      loadDashboardStats();
    });
  </script>
</body>

</html>
