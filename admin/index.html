<!DOCTYPE html>
<!-- Admin Dashboard: unread questions badge, summary stats, navigation to sub-pages -->
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة الإدارة – ضيافة للسياحة</title>
  <!-- Tailwind CSS v4 Play CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-primary: #1aace2;
      --color-primary-dark: #0f86b2;
      --color-primary-light: #ebf6f5;
      --color-primary-mid: #5bbee1;
      --color-accent: #fb9610;
      --color-accent-dark: #c8740a;
      --color-accent-light: #ebf6f5;
      --color-success: #1f7a53;
      --color-danger: #a53d38;
      --color-warning: #8a6a1f;
      --color-text: #163042;
      --color-text-muted: #4d6776;
      --color-border: #bfe3ef;
      --color-bg-alt: #ebf6f5;
      --color-bg-warm: #f5eec4;
      --font-size-base: 1.125rem;
      --font-size-sm: 1rem;
      --font-size-lg: 1.25rem;
      --border-radius: 0.5rem;
      --border-radius-lg: 0.875rem;
      --touch-target-min: 44px;
    }
  </style>
  <!-- Custom styles -->
  <link rel="stylesheet" href="../css/custom.css" />
</head>
<!-- Body hidden by default; revealed after auth check passes (Requirement 5.6) -->

<body style="display:none" class="admin-shell">

  <!-- Admin navbar -->
  <nav class="admin-navbar bg-white/95 border-b border-primary-light shadow-sm" role="navigation">
    <div class="mx-auto px-4 flex items-center justify-between min-h-[44px] max-w-7xl">
      <a class="flex items-center gap-2 font-bold text-primary-dark text-lg min-h-[44px] no-underline"
        href="index.html">
        <img src="../img/logo.png" alt="Dheyafa Tourism Logo" class="navbar-logo">
        <span data-i18n="admin_dashboard">لوحة التحكم</span>
      </a>
      <div class="admin-lang-switch flex items-center gap-2">
        <button
          class="lang-btn admin-lang-btn min-h-[44px] min-w-[44px] bg-primary-light border border-primary text-primary-dark font-bold text-sm rounded px-3 hover:bg-primary hover:text-white transition-colors"
          onclick="setLanguage('ar')">AR</button>
        <button
          class="lang-btn admin-lang-btn min-h-[44px] min-w-[44px] bg-primary-light border border-primary text-primary-dark font-bold text-sm rounded px-3 hover:bg-primary hover:text-white transition-colors"
          onclick="setLanguage('fr')">FR</button>
        <button
          class="min-h-[44px] px-4 py-2 bg-danger text-white font-semibold text-sm rounded hover:bg-red-700 transition-colors"
          id="logout-btn" data-i18n="admin_logout">تسجيل الخروج</button>
      </div>
    </div>
  </nav>

  <main class="mx-auto px-4 max-w-7xl py-8">
    <h1 class="mb-5 admin-page-title" data-i18n="admin_dashboard">لوحة التحكم</h1>

    <!-- Stats row -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="admin-stat text-center">
        <h2 class="text-5xl font-bold text-primary" id="stat-unread-questions">–</h2>
        <p class="text-text-muted mt-1" data-i18n="admin_unread_questions">أسئلة غير مقروءة</p>
      </div>
      <div class="admin-stat text-center">
        <h2 class="text-5xl font-bold text-primary" id="stat-total-voyages">–</h2>
        <p class="text-text-muted mt-1" data-i18n="admin_total_voyages">إجمالي الرحلات</p>
      </div>
      <div class="admin-stat text-center">
        <h2 class="text-5xl font-bold text-primary" id="stat-pending-registrations">–</h2>
        <p class="text-text-muted mt-1" data-i18n="admin_pending_registrations">تسجيلات قيد الانتظار</p>
      </div>
    </div>

    <!-- Navigation links to sub-pages -->
    <div class="admin-toolbar grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
      <a href="voyages.html"
        class="inline-flex items-center justify-center w-full min-h-[44px] py-3 px-4 border-2 border-primary text-primary font-semibold rounded hover:bg-primary hover:text-white transition-colors"
        data-i18n="admin_voyages">الرحلات</a>
      <a href="registrations.html"
        class="inline-flex items-center justify-center w-full min-h-[44px] py-3 px-4 border-2 border-primary text-primary font-semibold rounded hover:bg-primary hover:text-white transition-colors"
        data-i18n="admin_registrations">التسجيلات</a>
      <a href="questions.html"
        class="inline-flex items-center justify-center w-full min-h-[44px] py-3 px-4 border-2 border-primary text-primary font-semibold rounded hover:bg-primary hover:text-white transition-colors">
        <span data-i18n="admin_questions">الأسئلة</span>
        <span class="inline-block px-2 py-0.5 text-xs font-semibold rounded bg-danger text-white ms-1" id="unread-badge"
          style="display:none"></span>
      </a>
      <a href="achievements.html"
        class="inline-flex items-center justify-center w-full min-h-[44px] py-3 px-4 border-2 border-primary text-primary font-semibold rounded hover:bg-primary hover:text-white transition-colors"
        data-i18n="admin_achievements">الإنجازات</a>
    </div>
  </main>

  <!-- Firebase JS SDK v9 compat -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <!-- Shared JS modules — firebase-init and auth-guard MUST be first -->
  <script src="../js/firebase-init.js"></script>
  <script src="../js/auth-guard.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/toast.js"></script>

  <script>
    // ── Logout ───────────────────────────────────────────────────────────────
    document.getElementById("logout-btn").addEventListener("click", function () {
      firebase.auth().signOut().then(function () {
        window.location.href = "login.html";
      });
    });

    // ── Dashboard stats ──────────────────────────────────────────────────────
    /**
     * Loads summary statistics from Firebase RTDB and updates the dashboard:
     *   - Unread questions count  (/questions where isRead === false)
     *   - Total active voyages    (/voyages  where status  === "active")
     *   - Pending registrations   (/registrations where status === "pending")
     *
     * Requirements: 5.1, 5.6, 8.3
     */
    function loadDashboardStats() {
      var db = firebase.database();

      // ── Unread questions ─────────────────────────────────────────────────
      db.ref("questions").once("value", function (snapshot) {
        var unreadCount = 0;
        snapshot.forEach(function (child) {
          var q = child.val();
          if (q && q.isRead === false) {
            unreadCount++;
          }
        });

        document.getElementById("stat-unread-questions").textContent = unreadCount;

        // Update the nav badge
        var badge = document.getElementById("unread-badge");
        if (unreadCount > 0) {
          badge.textContent = unreadCount;
          badge.style.display = "";
        } else {
          badge.style.display = "none";
        }
      });

      // ── Total active voyages ─────────────────────────────────────────────
      db.ref("voyages").once("value", function (snapshot) {
        var activeCount = 0;
        snapshot.forEach(function (child) {
          var v = child.val();
          if (v && v.status === "active") {
            activeCount++;
          }
        });
        document.getElementById("stat-total-voyages").textContent = activeCount;
      });

      // ── Pending registrations ────────────────────────────────────────────
      db.ref("registrations").once("value", function (snapshot) {
        var pendingCount = 0;
        snapshot.forEach(function (child) {
          var r = child.val();
          if (r && r.status === "pending") {
            pendingCount++;
          }
        });
        document.getElementById("stat-pending-registrations").textContent = pendingCount;
      });
    }

    // Load stats once the DOM is ready (auth-guard will have revealed the body)
    document.addEventListener("DOMContentLoaded", function () {
      loadDashboardStats();
    });
  </script>
</body>

</html>
